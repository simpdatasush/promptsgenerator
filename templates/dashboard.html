<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperPrompter Suite - Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">

    <style>
        :root {
            --color-primary: #007bff;     /* Landing Page Blue */
            --color-dark-bg: #343a40;     /* Landing Page Charcoal */
            --color-accent: #C3497C;      
            --color-bg-light: #f0f2f5;
            --color-text-dark: #2c3e50;
            --shadow-standard: 0 4px 15px rgba(0, 0, 0, 0.1);
            --radius-standard: 10px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-top: 100px; 
            background-color: var(--color-bg-light);
            color: var(--color-text-dark);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Unified Header */
        .app-header {
            background-color: var(--color-dark-bg);
            color: #ffffff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .app-header .logo-section { display: flex; align-items: center; }
        .app-header .app-logo { height: 40px; margin-right: 15px; border-radius: 5px; }

        .app-header h1.header-title {
            margin: 0;
            font-size: 1.8rem;
            color: #ffffff;
        }

        .nav-section a {
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-section a:hover {
            color: var(--color-primary);
        }

        .container {
            flex-grow: 1;
            max-width: 1100px;
            margin: 40px auto;
        }

        /* The Brick Grid Layout */
        .brick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .brick-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 200px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .brick-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: #007bff;
        }

        .brick-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .brick-desc {
            font-size: 0.9rem;
            color: #6c757d;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .brick-link {
            margin-top: 15px;
            font-weight: 600;
            text-decoration: none !important;
            color: #007bff;
            display: flex;
            align-items: center;
        }

        .brick-link i {
            font-size: 0.8rem;
            margin-left: 5px;
        }

        .letter-btn {
            border: 1px solid #dee2e6;
            background: white;
            width: 38px;
            height: 38px;
            margin: 4px;
            border-radius: 6px;
            font-weight: bold;
            color: var(--color-primary);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .letter-btn:hover {
            background-color: #f8f9fa;
            border-color: var(--color-primary);
        }

        .letter-btn.active {
            background-color: var(--color-primary) !important;
            color: white !important;
            border-color: var(--color-primary) !important;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            transform: scale(1.1);
        }

        .category-header {
            width: 100%;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 8px;
            margin: 40px 0 20px 0;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--color-text-dark);
            font-size: 1.2rem;
        }

        .footer {
            padding: 20px;
            text-align: center;
            font-size: 0.85rem;
            background-color: #ffffff;
            border-top: 1px solid #dee2e6;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-section">
            <img src="https://placehold.co/40x40/007bff/ffffff?text=AI" alt="SuperPrompter Hub" class="app-logo">
            <h1 class="header-title">SuperPrompter Workspace</h1>
        </div>
        <div class="nav-section">
            <a href="{{ url_for('dashboard') }}" class="text-white"><i class="fas fa-th-large mr-1"></i> Dashboard</a>
        </div>
    </header>

    <div class="container">
        <div class="text-center mb-5">
            <h2 class="font-weight-bold">Your Application Suites</h2>
            <p class="text-muted">Select an AI tool module below to get started.</p>
        </div>

        <div class="alphabet-nav d-flex flex-wrap justify-content-center mb-5">
            {% for char in "ABCDEFGHIJKLMNOPQRSTUVWXYZ" %}
            <button class="letter-btn" onclick="filterByLetter('{{ char }}', this)">{{ char }}</button>
            {% endfor %}
        </div>

        <div id="dynamic-apps-container"></div>
    </div>

    <footer class="footer">
        <div class="footer-content">
            &copy; 2026 SuperPrompter Platform Management Suite
        </div>
    </footer>

    <script>
        // Native Applications Registry - Mapped explicitly to internal platform view locations
        const allApps = [
            {
                title: "SuperPrompter Engine",
                category: "Prompt Generation",
                desc: "Our core framework optimized for prompt engineering workflows and advanced multi-tier LLM assembly pipeline operations.",
                url: "{{ url_for('app_home') }}" // <-- Updated from 'index' to 'app_home'
            },
            {
                title: "Story Architect Engine",
                category: "Creative Automation",
                desc: "An iterative text formatting framework optimized for retaining multi-character narrative structures across context sequences.",
                url: "{{ url_for('app_home') }}" // Standby structural link pointer placeholder 
            },
            {
                title: "Quantitative Trading Options Evaluator",
                category: "Financial Utilities",
                desc: "A localized evaluation framework built to compute option option chains, volume patterns, and execution indicators.",
                url: "{{ url_for('app_home') }}" // Standby structural link pointer placeholder
            }
        ];

        function filterByLetter(letter, element) {
            document.querySelectorAll('.letter-btn').forEach(btn => btn.classList.remove('active'));

            if (element) {
                element.classList.add('active');
            } else {
                const buttons = document.querySelectorAll('.letter-btn');
                Array.from(buttons).find(b => b.textContent === letter)?.classList.add('active');
            }

            const container = document.getElementById('dynamic-apps-container');
            container.innerHTML = "";

            const matches = allApps.filter(app => app.title.toUpperCase().startsWith(letter));

            if (matches.length === 0) {
                container.innerHTML = `
                <div class="text-center py-5">
                    <p class="text-muted">No custom application suites discovered starting with <strong>${letter}</strong>.</p>
                </div>`;
                return;
            }

            const grouped = matches.reduce((acc, app) => {
                acc[app.category] = acc[app.category] || [];
                acc[app.category].push(app);
                return acc;
            }, {});

            for (const [category, apps] of Object.entries(grouped)) {
                let section = `<h3 class="category-header">${category}</h3><div class="brick-grid">`;

                apps.forEach(app => {
                    section += `
                    <div class="brick-card">
                        <div class="brick-title">${app.title}</div>
                        <div class="brick-desc">${app.desc}</div>
                        <a href="${app.url}" class="brick-link">
                            Open Application Suite <i class="fas fa-arrow-right ml-1" style="font-size:0.75rem;"></i>
                        </a>
                    </div>`;
                });

                section += `</div>`;
                container.insertAdjacentHTML('beforeend', section);
            }
        }

        // Initialize display context with standard alphabetical sort index default anchor positioning
        document.addEventListener("DOMContentLoaded", () => {
            // Evaluates current application options to find the first populated character index target dynamically
            filterByLetter('S'); 
        });
    </script>
</body>
</html>
